name: Refresh follower counts

# Runs server-side every 4 hours. Fetches all 7 social-platform follower
# counts directly (no CORS proxies needed), then commits the result to
# public/follower-counts.json — which the static site reads at runtime.
#
# Trigger manually anytime from the Actions tab → "Run workflow".

on:
  schedule:
    - cron: '17 */4 * * *' # every 4 hours, off the hour to dodge CI rush
  workflow_dispatch:
  push:
    paths:
      - 'scripts/fetch-counts.mjs'
      - '.github/workflows/refresh-counts.yml'

permissions:
  contents: write

concurrency:
  group: refresh-counts
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # need write access to push the updated JSON back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch counts
        run: node scripts/fetch-counts.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/follower-counts.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh follower counts [skip ci]"
            git push
          fi
